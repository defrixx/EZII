name: CI/CD Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize security report files
        run: |
          mkdir -p /tmp/security
          echo "[]" > /tmp/security/gitleaks.json
          echo '{"results":[]}' > /tmp/security/bandit.json
          echo '{"results":[]}' > /tmp/security/semgrep.json
          echo '{"Results":[]}' > /tmp/security/trivy-vuln.json
          echo '{"Results":[]}' > /tmp/security/trivy-misconfig.json
          echo '{"Results":[]}' > /tmp/security/trivy-secret.json
          echo "99" > /tmp/security/trivy-vuln.exit
          echo "99" > /tmp/security/trivy-misconfig.exit
          echo "99" > /tmp/security/trivy-secret.exit

      - name: Secret scan (gitleaks CLI)
        run: |
          set -o pipefail
          mkdir -p /tmp/security
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-color --verbose --gitleaks-ignore-path .gitleaksignore \
            --report-format json --report-path /tmp/security/gitleaks.json 2>&1 | tee /tmp/gitleaks.log || true

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python SAST scanners
        run: |
          python -m venv /tmp/sast_env
          /tmp/sast_env/bin/python -m pip install --upgrade pip
          /tmp/sast_env/bin/python -m pip install bandit==1.9.4 semgrep==1.156.0

      - name: Install Python dependency-audit scanner
        run: |
          python -m venv /tmp/audit_env
          /tmp/audit_env/bin/python -m pip install --upgrade pip
          /tmp/audit_env/bin/python -m pip install pip-audit==2.10.0

      - name: Python SAST (bandit)
        run: |
          set -o pipefail
          /tmp/sast_env/bin/bandit -q -r backend/app scripts -lll -ii \
            -f json -o /tmp/security/bandit.json 2>&1 | tee /tmp/bandit.log || true

      - name: Cross-language SAST (semgrep)
        run: |
          set -o pipefail
          /tmp/sast_env/bin/semgrep --config p/security-audit --config p/secrets --severity ERROR --metrics=off \
            --json --output /tmp/security/semgrep.json \
            backend frontend .github 2>&1 | tee /tmp/semgrep.log || true

      - name: Trivy vuln scan
        run: |
          set -o pipefail
          set +e
          docker run --rm -v "$PWD:/src" -v "/tmp/security:/out" aquasec/trivy:0.69.3 fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignorefile /src/.trivyignore \
            --no-progress --format json --output /out/trivy-vuln.json \
            /src 2>&1 | tee /tmp/trivy_vuln.log
          status=${PIPESTATUS[0]}
          set -e
          echo "${status}" > /tmp/security/trivy-vuln.exit

      - name: Trivy misconfig scan
        run: |
          set -o pipefail
          set +e
          docker run --rm -v "$PWD:/src" -v "/tmp/security:/out" aquasec/trivy:0.69.3 fs \
            --scanners misconfig \
            --severity HIGH,CRITICAL \
            --ignorefile /src/.trivyignore \
            --no-progress --format json --output /out/trivy-misconfig.json \
            /src 2>&1 | tee /tmp/trivy_misconfig.log
          status=${PIPESTATUS[0]}
          set -e
          echo "${status}" > /tmp/security/trivy-misconfig.exit

      - name: Trivy secret scan
        run: |
          set -o pipefail
          set +e
          docker run --rm -v "$PWD:/src" -v "/tmp/security:/out" aquasec/trivy:0.69.3 fs \
            --scanners secret \
            --severity HIGH,CRITICAL \
            --ignorefile /src/.trivyignore \
            --no-progress --format json --output /out/trivy-secret.json \
            /src 2>&1 | tee /tmp/trivy_secret.log
          status=${PIPESTATUS[0]}
          set -e
          echo "${status}" > /tmp/security/trivy-secret.exit

      - name: Backend dependency audit (production requirements)
        run: |
          set -o pipefail
          /tmp/audit_env/bin/pip-audit -r backend/requirements.txt 2>&1 | tee /tmp/backend_pip_audit.log

      - name: Backend dependency audit (development requirements)
        run: |
          set -o pipefail
          /tmp/audit_env/bin/pip-audit -r backend/requirements-dev.txt --ignore-vuln CVE-2026-4539 2>&1 | tee /tmp/backend_pip_audit_dev.log

      - name: Backend outdated report (production requirements)
        run: |
          python -m venv /tmp/backend_prod_env
          /tmp/backend_prod_env/bin/python -m pip install --upgrade pip
          /tmp/backend_prod_env/bin/python -m pip install -r backend/requirements.txt
          /tmp/backend_prod_env/bin/python -m pip list --outdated 2>&1 | tee /tmp/backend_outdated.log || true

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Backend syntax check
        run: python -m compileall backend/app scripts/seed.py

      - name: Backend tests with coverage gate
        run: |
          set -o pipefail
          if [ -d backend/tests ] || [ -d tests ]; then
            PYTHONPATH=backend pytest -q backend/tests \
              --cov=app \
              --cov-report=term-missing \
              --cov-report=xml:/tmp/backend_coverage.xml \
              --cov-fail-under=55 \
              2>&1 | tee /tmp/backend_pytest.log
          else
            echo "No backend tests found, skipping pytest" | tee /tmp/backend_pytest.log
            echo "No backend tests found, skipping pytest"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          set -o pipefail
          npm audit --omit=dev --audit-level=high 2>&1 | tee /tmp/frontend_npm_audit.log

      - name: Frontend dependency audit (all dependencies incl. dev)
        working-directory: frontend
        run: |
          set -o pipefail
          npm audit --audit-level=high 2>&1 | tee /tmp/frontend_npm_audit_dev.log

      - name: Frontend outdated report
        working-directory: frontend
        run: npm outdated 2>&1 | tee /tmp/frontend_outdated.log || true

      - name: Frontend tests
        working-directory: frontend
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/frontend_vitest.log

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Compute security counters and enforce policy gates
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          def read_json(path: str):
              p = Path(path)
              if not p.exists() or p.stat().st_size == 0:
                  return None
              try:
                  return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return None

          def gitleaks_count() -> int:
              data = read_json("/tmp/security/gitleaks.json")
              if isinstance(data, list):
                  return len(data)
              if isinstance(data, dict):
                  findings = data.get("findings")
                  if isinstance(findings, list):
                      return len(findings)
              return 0

          def bandit_count() -> int:
              data = read_json("/tmp/security/bandit.json") or {}
              results = data.get("results")
              return len(results) if isinstance(results, list) else 0

          def semgrep_count() -> int:
              data = read_json("/tmp/security/semgrep.json") or {}
              results = data.get("results")
              return len(results) if isinstance(results, list) else 0

          def trivy_count(path: str, key: str) -> int:
              data = read_json(path) or {}
              total = 0
              for item in data.get("Results", []) if isinstance(data, dict) else []:
                  values = item.get(key)
                  if isinstance(values, list):
                      total += len(values)
              return total

          def read_exit_code(path: str) -> int:
              p = Path(path)
              if not p.exists():
                  return 99
              try:
                  return int((p.read_text(encoding="utf-8") or "").strip())
              except Exception:
                  return 99

          counts = {
              "GITLEAKS_FINDINGS": gitleaks_count(),
              "BANDIT_HIGH_FINDINGS": bandit_count(),
              "SEMGREP_ERROR_FINDINGS": semgrep_count(),
              "TRIVY_VULN_FINDINGS": trivy_count("/tmp/security/trivy-vuln.json", "Vulnerabilities"),
              "TRIVY_MISCONFIG_FINDINGS": trivy_count("/tmp/security/trivy-misconfig.json", "Misconfigurations"),
              "TRIVY_SECRET_FINDINGS": trivy_count("/tmp/security/trivy-secret.json", "Secrets"),
              "TRIVY_VULN_EXIT_CODE": read_exit_code("/tmp/security/trivy-vuln.exit"),
              "TRIVY_MISCONFIG_EXIT_CODE": read_exit_code("/tmp/security/trivy-misconfig.exit"),
              "TRIVY_SECRET_EXIT_CODE": read_exit_code("/tmp/security/trivy-secret.exit"),
          }

          fail_on_misconfig = True
          failed_checks = []
          if counts["GITLEAKS_FINDINGS"] > 0:
              failed_checks.append("GITLEAKS_FINDINGS")
          if counts["BANDIT_HIGH_FINDINGS"] > 0:
              failed_checks.append("BANDIT_HIGH_FINDINGS")
          if counts["SEMGREP_ERROR_FINDINGS"] > 0:
              failed_checks.append("SEMGREP_ERROR_FINDINGS")
          if counts["TRIVY_VULN_FINDINGS"] > 0:
              failed_checks.append("TRIVY_VULN_FINDINGS")
          if counts["TRIVY_SECRET_FINDINGS"] > 0:
              failed_checks.append("TRIVY_SECRET_FINDINGS")
          if fail_on_misconfig and counts["TRIVY_MISCONFIG_FINDINGS"] > 0:
              failed_checks.append("TRIVY_MISCONFIG_FINDINGS")
          if counts["TRIVY_VULN_EXIT_CODE"] != 0:
              failed_checks.append("TRIVY_VULN_SCAN_ERROR")
          if counts["TRIVY_MISCONFIG_EXIT_CODE"] != 0:
              failed_checks.append("TRIVY_MISCONFIG_SCAN_ERROR")
          if counts["TRIVY_SECRET_EXIT_CODE"] != 0:
              failed_checks.append("TRIVY_SECRET_SCAN_ERROR")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              for key, value in counts.items():
                  f.write(f"{key}={value}\n")
              f.write("SECURITY_POLICY_FAILED=" + ("1" if failed_checks else "0") + "\n")
              f.write("SECURITY_POLICY_FAILURES=" + (",".join(failed_checks) if failed_checks else "none") + "\n")

          if failed_checks:
              print("Security policy gate failed:", ", ".join(failed_checks), file=sys.stderr)
              sys.exit(1)
          PY

      - name: Extract backend coverage percent
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          cov_file = "/tmp/backend_coverage.xml"
          if not os.path.exists(cov_file):
              coverage = "0"
          else:
              root = ET.parse(cov_file).getroot()
              coverage = f"{float(root.attrib.get('line-rate', '0')) * 100:.2f}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"BACKEND_COVERAGE={coverage}\n")
          PY

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ci-quality-logs
          if-no-files-found: ignore
          path: |
            /tmp/gitleaks.log
            /tmp/bandit.log
            /tmp/semgrep.log
            /tmp/trivy_vuln.log
            /tmp/trivy_misconfig.log
            /tmp/trivy_secret.log
            /tmp/security/gitleaks.json
            /tmp/security/bandit.json
            /tmp/security/semgrep.json
            /tmp/security/trivy-vuln.json
            /tmp/security/trivy-misconfig.json
            /tmp/security/trivy-secret.json
            /tmp/backend_pip_audit.log
            /tmp/backend_pip_audit_dev.log
            /tmp/backend_outdated.log
            /tmp/backend_pytest.log
            /tmp/backend_coverage.xml
            /tmp/frontend_npm_audit.log
            /tmp/frontend_npm_audit_dev.log
            /tmp/frontend_outdated.log
            /tmp/frontend_vitest.log

      - name: CI warning and security summary
        if: always()
        shell: bash
        run: |
          backend_warn_count="$(grep -Eic '\bwarning\b|\bwarn\b' /tmp/backend_pytest.log 2>/dev/null || true)"
          frontend_warn_count="$(grep -Eic '\bwarning\b|\bwarn\b' /tmp/frontend_vitest.log 2>/dev/null || true)"
          backend_vuln_hits="$(grep -Eic 'CVE-|GHSA-' /tmp/backend_pip_audit.log 2>/dev/null || true)"
          frontend_vuln_hits="$(sed -nE 's/.*found[[:space:]]+([0-9]+)[[:space:]]+vulnerabilities.*/\1/p' /tmp/frontend_npm_audit.log 2>/dev/null | tail -n 1)"
          [ -n "${frontend_vuln_hits:-}" ] || frontend_vuln_hits=0
          backend_outdated_count="$(awk 'NR>2 && NF>0 {c++} END {print c+0}' /tmp/backend_outdated.log 2>/dev/null || true)"
          frontend_outdated_count="$(awk 'NR>1 && NF>0 {c++} END {print c+0}' /tmp/frontend_outdated.log 2>/dev/null || true)"
          gitleaks_findings="${GITLEAKS_FINDINGS:-0}"
          bandit_findings="${BANDIT_HIGH_FINDINGS:-0}"
          semgrep_findings="${SEMGREP_ERROR_FINDINGS:-0}"
          trivy_vuln_findings="${TRIVY_VULN_FINDINGS:-0}"
          trivy_misconfig_findings="${TRIVY_MISCONFIG_FINDINGS:-0}"
          trivy_secret_findings="${TRIVY_SECRET_FINDINGS:-0}"
          trivy_vuln_exit="${TRIVY_VULN_EXIT_CODE:-99}"
          trivy_misconfig_exit="${TRIVY_MISCONFIG_EXIT_CODE:-99}"
          trivy_secret_exit="${TRIVY_SECRET_EXIT_CODE:-99}"
          policy_failed="${SECURITY_POLICY_FAILED:-0}"
          policy_failures="${SECURITY_POLICY_FAILURES:-none}"

          {
            echo "## CI Quality Summary"
            echo
            echo "| Category | Backend | Frontend |"
            echo "|---|---:|---:|"
            echo "| Test warnings | ${backend_warn_count:-0} | ${frontend_warn_count:-0} |"
            echo "| Vulnerability indicators | ${backend_vuln_hits:-0} | ${frontend_vuln_hits:-0} |"
            echo "| Outdated packages | ${backend_outdated_count:-0} | ${frontend_outdated_count:-0} |"
            echo "| Backend test coverage (%) | ${BACKEND_COVERAGE:-0} | n/a |"
            echo
            echo "### Security Policy Snapshot"
            echo
            echo "| Scanner Gate | Findings | Gate Status |"
            echo "|---|---:|---|"
            echo "| Gitleaks | ${gitleaks_findings} | $([ "${gitleaks_findings}" -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| Bandit (HIGH severity, -lll -ii) | ${bandit_findings} | $([ "${bandit_findings}" -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| Semgrep (ERROR severity) | ${semgrep_findings} | $([ "${semgrep_findings}" -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| Trivy vuln (HIGH/CRITICAL) | ${trivy_vuln_findings} | $([ "${trivy_vuln_findings}" -eq 0 ] && echo PASS || echo FAIL) |"
            misconfig_status="$([ "${trivy_misconfig_findings}" -eq 0 ] && echo PASS || echo FAIL)"
            misconfig_mode="enforced"
            echo "| Trivy misconfig (HIGH/CRITICAL, ${misconfig_mode}) | ${trivy_misconfig_findings} | ${misconfig_status} |"
            echo "| Trivy secret (HIGH/CRITICAL) | ${trivy_secret_findings} | $([ "${trivy_secret_findings}" -eq 0 ] && echo PASS || echo FAIL) |"
            echo
            echo "Trivy execution exit codes: vuln=${trivy_vuln_exit}, misconfig=${trivy_misconfig_exit}, secret=${trivy_secret_exit}"
            echo
            echo "Policy gate result: $([ "${policy_failed}" = "1" ] && echo FAIL || echo PASS)"
            echo "Triggered gate(s): ${policy_failures}"
            echo
            echo "### Security Scans"
            echo
            echo "<details><summary>Gitleaks</summary>"
            echo
            if [ "${gitleaks_findings}" -eq 0 ]; then
              echo "No findings."
            elif [ -s /tmp/gitleaks.log ]; then
              echo '```text'
              perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' /tmp/gitleaks.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Bandit</summary>"
            echo
            if [ "${bandit_findings}" -eq 0 ]; then
              echo "No findings."
            elif [ -s /tmp/security/bandit.json ]; then
              echo '```json'
              cat /tmp/security/bandit.json
              echo '```'
            elif [ -s /tmp/bandit.log ]; then
              echo '```text'
              cat /tmp/bandit.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Semgrep</summary>"
            echo
            if [ -s /tmp/semgrep.log ]; then
              echo '```text'
              cat /tmp/semgrep.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Trivy vuln scan</summary>"
            echo
            if [ -s /tmp/trivy_vuln.log ]; then
              echo '```text'
              cat /tmp/trivy_vuln.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Trivy misconfig scan</summary>"
            echo
            if [ -s /tmp/trivy_misconfig.log ]; then
              echo '```text'
              cat /tmp/trivy_misconfig.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Trivy secret scan</summary>"
            echo
            if [ -s /tmp/trivy_secret.log ]; then
              echo '```text'
              cat /tmp/trivy_secret.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "### Warnings During Tests"
            echo
            echo "<details><summary>Backend pytest warnings (first 120)</summary>"
            echo
            if [ "${backend_warn_count:-0}" -eq 0 ]; then
              echo "No warnings found."
            else
              echo '```text'
              grep -Ein '\bwarning\b|\bwarn\b' /tmp/backend_pytest.log 2>/dev/null | head -n 120 || true
              echo '```'
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Frontend vitest warnings (first 120)</summary>"
            echo
            if [ "${frontend_warn_count:-0}" -eq 0 ]; then
              echo "No warnings found."
            else
              echo '```text'
              grep -Ein '\bwarning\b|\bwarn\b' /tmp/frontend_vitest.log 2>/dev/null | head -n 120 || true
              echo '```'
            fi
            echo
            echo "</details>"
            echo
            echo "### Vulnerability Scans"
            echo
            echo "<details><summary>Backend pip-audit (production requirements)</summary>"
            echo
            if [ -s /tmp/backend_pip_audit.log ]; then
              echo '```text'
              cat /tmp/backend_pip_audit.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Frontend npm audit (--omit=dev --audit-level=high)</summary>"
            echo
            if [ -s /tmp/frontend_npm_audit.log ]; then
              echo '```text'
              cat /tmp/frontend_npm_audit.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Backend pip-audit (development requirements)</summary>"
            echo
            if [ -s /tmp/backend_pip_audit_dev.log ]; then
              echo '```text'
              cat /tmp/backend_pip_audit_dev.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Frontend npm audit (all deps incl. dev, --audit-level=high)</summary>"
            echo
            if [ -s /tmp/frontend_npm_audit_dev.log ]; then
              echo '```text'
              cat /tmp/frontend_npm_audit_dev.log
              echo '```'
            else
              echo "No output captured."
            fi
            echo
            echo "</details>"
            echo
            echo "### Outdated Packages"
            echo
            echo "<details><summary>Backend pip list --outdated (production requirements)</summary>"
            echo
            if [ -s /tmp/backend_outdated.log ]; then
              echo '```text'
              cat /tmp/backend_outdated.log
              echo '```'
            else
              echo "No outdated backend packages reported."
            fi
            echo
            echo "</details>"
            echo
            echo "<details><summary>Frontend npm outdated</summary>"
            echo
            if [ -s /tmp/frontend_outdated.log ]; then
              echo '```text'
              cat /tmp/frontend_outdated.log
              echo '```'
            else
              echo "No outdated frontend packages reported."
            fi
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    concurrency:
      group: ezii-prod-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.VDS_DEPLOY_PATH }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          VDS_GIT_PAT: ${{ secrets.VDS_GIT_PAT }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POSTGRES_USER_SECRET: ${{ secrets.POSTGRES_USER }}
          APP_DB_NAME_SECRET: ${{ secrets.APP_DB_NAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_ADMIN: ${{ secrets.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          PROVIDER_API_KEY_ENCRYPTION_KEY_SECRET: ${{ secrets.PROVIDER_API_KEY_ENCRYPTION_KEY }}
          EMBEDDINGS_API_TOKEN_SECRET: ${{ secrets.EMBEDDINGS_API_TOKEN }}
          EMBEDDING_VECTOR_SIZE_SECRET: ${{ secrets.EMBEDDING_VECTOR_SIZE }}
          HCAPTCHA_SECRET_KEY_SECRET: ${{ secrets.HCAPTCHA_SECRET_KEY }}
          NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY_SECRET: ${{ secrets.NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          envs: DEPLOY_PATH,REPO,REF,VDS_GIT_PAT,DEPLOY_ENV_FILE,OPENROUTER_API_KEY,POSTGRES_USER_SECRET,APP_DB_NAME_SECRET,POSTGRES_PASSWORD,KEYCLOAK_ADMIN,KEYCLOAK_ADMIN_PASSWORD,PROVIDER_API_KEY_ENCRYPTION_KEY_SECRET,EMBEDDINGS_API_TOKEN_SECRET,EMBEDDING_VECTOR_SIZE_SECRET,HCAPTCHA_SECRET_KEY_SECRET,NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY_SECRET
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -z "${VDS_GIT_PAT:-}" ]; then
                echo "VDS_GIT_PAT is required for first clone" >&2
                exit 1
              fi
              git clone "https://x-access-token:${VDS_GIT_PAT}@github.com/${REPO}.git" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git checkout "$REF"
            git pull --ff-only origin "$REF"

            printf "%s" "${DEPLOY_ENV_FILE}" > .env
            sed -i.bak 's/\r$//' .env
            rm -f .env.bak

            upsert_env() {
              key="$1"
              value="$2"
              tmp_file="$(mktemp)"
              grep -Ev "^[[:space:]]*${key}[[:space:]]*=" .env > "${tmp_file}" || true
              mv "${tmp_file}" .env
              printf '%s=%s\n' "$key" "$value" >> .env
            }

            if [ -n "${POSTGRES_USER_SECRET:-}" ]; then
              upsert_env "POSTGRES_USER" "${POSTGRES_USER_SECRET}"
            fi
            if [ -n "${APP_DB_NAME_SECRET:-}" ]; then
              upsert_env "APP_DB_NAME" "${APP_DB_NAME_SECRET}"
            fi
            upsert_env "OPENROUTER_API_KEY" "${OPENROUTER_API_KEY}"
            upsert_env "POSTGRES_PASSWORD" "${POSTGRES_PASSWORD}"
            upsert_env "KEYCLOAK_ADMIN" "${KEYCLOAK_ADMIN}"
            upsert_env "KEYCLOAK_ADMIN_PASSWORD" "${KEYCLOAK_ADMIN_PASSWORD}"
            if [ -n "${PROVIDER_API_KEY_ENCRYPTION_KEY_SECRET:-}" ]; then
              upsert_env "PROVIDER_API_KEY_ENCRYPTION_KEY" "${PROVIDER_API_KEY_ENCRYPTION_KEY_SECRET}"
            fi
            if [ -n "${EMBEDDINGS_API_TOKEN_SECRET:-}" ]; then
              upsert_env "EMBEDDINGS_API_TOKEN" "${EMBEDDINGS_API_TOKEN_SECRET}"
            fi
            if [ -n "${EMBEDDING_VECTOR_SIZE_SECRET:-}" ]; then
              upsert_env "EMBEDDING_VECTOR_SIZE" "${EMBEDDING_VECTOR_SIZE_SECRET}"
            fi
            if [ -n "${HCAPTCHA_SECRET_KEY_SECRET:-}" ]; then
              upsert_env "HCAPTCHA_SECRET_KEY" "${HCAPTCHA_SECRET_KEY_SECRET}"
            fi
            if [ -n "${NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY_SECRET:-}" ]; then
              upsert_env "NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY" "${NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY_SECRET}"
            fi
            if [ -n "${HCAPTCHA_SECRET_KEY_SECRET:-}" ] && [ -n "${NEXT_PUBLIC_REGISTER_HCAPTCHA_SITE_KEY_SECRET:-}" ]; then
              upsert_env "REGISTER_ENFORCE_CAPTCHA" "true"
              upsert_env "REGISTER_CAPTCHA_PROVIDER" "hcaptcha"
              upsert_env "NEXT_PUBLIC_REGISTER_ENFORCE_CAPTCHA" "true"
              upsert_env "NEXT_PUBLIC_REGISTER_CAPTCHA_PROVIDER" "hcaptcha"
            fi

            # Keep DATABASE_URL in sync with DB password secret.
            DB_USER="$(grep -m1 -E '^[[:space:]]*POSTGRES_USER[[:space:]]*=' .env | sed -E 's/^[[:space:]]*POSTGRES_USER[[:space:]]*=[[:space:]]*//' || true)"
            DB_NAME="$(grep -m1 -E '^[[:space:]]*APP_DB_NAME[[:space:]]*=' .env | sed -E 's/^[[:space:]]*APP_DB_NAME[[:space:]]*=[[:space:]]*//' || true)"
            [ -n "${DB_USER}" ] || DB_USER="app"
            [ -n "${DB_NAME}" ] || DB_NAME="app"
            DB_PASS_URLENC="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_PASSWORD"], safe=""))')"
            upsert_env "DATABASE_URL" "postgresql+psycopg2://${DB_USER}:${DB_PASS_URLENC}@postgres:5432/${DB_NAME}"
            if [ "$(grep -c -E '^[[:space:]]*DATABASE_URL[[:space:]]*=' .env)" -ne 1 ]; then
              echo "Invalid .env: multiple DATABASE_URL entries" >&2
              exit 1
            fi
            echo "DB config resolved: POSTGRES_USER=${DB_USER}, APP_DB_NAME=${DB_NAME}"

            docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans || true
            # Defensive cleanup: remove any container currently publishing host Keycloak ports.
            docker ps -q --filter publish=8080 | xargs -r docker rm -f || true
            docker ps -q --filter publish=18080 | xargs -r docker rm -f || true

            # Bring up DB/cache/vector first. Keycloak/backend start only after DB auth verification.
            if ! docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d postgres redis qdrant; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=300 postgres redis qdrant || true
              exit 1
            fi

            # Wait until Postgres accepts connections before running SQL.
            ready=0
            for _ in $(seq 1 60); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U "${DB_USER}" -d postgres >/dev/null 2>&1; then
                ready=1
                break
              fi
              sleep 2
            done
            if [ "${ready}" -ne 1 ]; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=300 postgres || true
              echo "Postgres did not become ready in time"
              exit 1
            fi

            # Keep DB role password in sync with current secret even for existing volumes.
            DB_USER_SQL="$(printf '%s' "${DB_USER}" | sed 's/\"/\"\"/g')"
            DB_PASS_SQL="$(printf '%s' "${POSTGRES_PASSWORD}" | sed "s/'/''/g")"
            printf 'ALTER ROLE "%s" WITH PASSWORD '\''%s'\'';\n' "${DB_USER_SQL}" "${DB_PASS_SQL}" \
              | docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres \
                psql -v ON_ERROR_STOP=1 -U "${DB_USER}" -d postgres

            # Verify new credentials over TCP before starting services depending on DB.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T \
              -e PGPASSWORD="${POSTGRES_PASSWORD}" postgres \
              psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "${DB_USER}" -d "${DB_NAME}" -c "SELECT 1;"

            if ! docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build keycloak backend frontend nginx; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=300 postgres redis qdrant keycloak backend frontend nginx || true
              exit 1
            fi

            wait_service_ready() {
              svc="$1"
              attempts="${2:-90}"
              i=0
              while [ "${i}" -lt "${attempts}" ]; do
                cid="$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q "${svc}" || true)"
                if [ -n "${cid}" ]; then
                  status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${cid}" 2>/dev/null || true)"
                  if [ "${status}" = "healthy" ] || [ "${status}" = "running" ]; then
                    echo "Service ${svc} is ${status}"
                    return 0
                  fi
                fi
                i=$((i + 1))
                sleep 2
              done
              echo "Service ${svc} did not become ready in time" >&2
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 "${svc}" || true
              return 1
            }

            wait_service_ready keycloak 120
            wait_service_ready backend 120
            wait_service_ready nginx 120

            # Service readiness snapshot before post-deploy steps.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            ./scripts/configure-keycloak-client.sh
            ./scripts/check-auth-config.sh
            docker compose exec -T backend python /scripts/seed.py
            docker compose exec -T backend python -c "import urllib.request; body = urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read().decode(); assert '\"status\":\"ok\"' in body, body; print('Backend health smoke: OK')"
            docker compose exec -T frontend node -e "const http=require('http');let n=0;const max=60;const probe=()=>{n++;const req=http.get('http://127.0.0.1:3000',r=>{if(r.statusCode<500){console.log('Frontend health smoke: OK');process.exit(0);}if(n>=max){console.error('frontend returned status '+r.statusCode);process.exit(1);}setTimeout(probe,1000);});req.on('error',()=>{if(n>=max){console.error('frontend not ready');process.exit(1);}setTimeout(probe,1000);});};probe();"
