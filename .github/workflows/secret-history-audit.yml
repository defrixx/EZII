name: Secret History Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  gitleaks-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks

      - name: Run full git history secret scan
        run: |
          mkdir -p /tmp/security
          /tmp/gitleaks git \
            --timeout 1800 \
            --log-opts="--all" \
            --no-color \
            --verbose \
            --gitleaks-ignore-path .gitleaksignore \
            --report-format json \
            --report-path /tmp/security/gitleaks-history.json \
            .

      - name: Upload history scan artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: gitleaks-history-report
          if-no-files-found: ignore
          path: /tmp/security/gitleaks-history.json
